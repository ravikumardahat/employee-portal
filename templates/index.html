<!DOCTYPE html>
<html>
<head>

<title>Employee Management Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h1>Employee Management Portal</h1>
</div>

<div class="card-body">

<form action="/add" method="post">

<div class="mb-3">
<label class="form-label">Employee Name</label>
<input type="text"
       class="form-control"
       name="name"
       required>
</div>

<div class="mb-3">
<label class="form-label">Department</label>
<input type="text"
       class="form-control"
       name="department"
       required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email"
       class="form-control"
       name="email"
       required>
</div>

<button type="submit"
        class="btn btn-success">
    Add Employee
</button>

</form>

</div>
</div>

<br>

<div class="card shadow">

<div class="card-header">
<h2>Employee Records</h2>
</div>

<div class="card-body">

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Email</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for emp in employees %}

<tr>

<td>{{ emp[0] }}</td>
<td>{{ emp[1] }}</td>
<td>{{ emp[2] }}</td>
<td>{{ emp[3] }}</td>

<td>

<a href="/edit/{{ emp[0] }}"
   class="btn btn-primary btn-sm">
   Edit
</a>

<a href="/delete/{{ emp[0] }}"
   class="btn btn-danger btn-sm">
   Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
