<!DOCTYPE html>
<html>
<head>

<title>Edit Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">
<h2>Edit Employee</h2>
</div>

<div class="card-body">

<form action="/update/{{ employee[0] }}"
      method="post">

<div class="mb-3">

<label>Name</label>

<input type="text"
       class="form-control"
       name="name"
       value="{{ employee[1] }}"
       required>

</div>

<div class="mb-3">

<label>Department</label>

<input type="text"
       class="form-control"
       name="department"
       value="{{ employee[2] }}"
       required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email"
       class="form-control"
       name="email"
       value="{{ employee[3] }}"
       required>

</div>

<button type="submit"
        class="btn btn-success">
    Update Employee
</button>

<a href="/"
   class="btn btn-secondary">
   Cancel
</a>

</form>

</div>

</div>

</div>

</body>
</html>
