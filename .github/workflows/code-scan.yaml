name: Code Scan

on:
  workflow_call:
  workflow_dispatch:

jobs:
  code-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit pip-audit
          pip install -r requirements.txt

      - name: Flake8 Scan
        run: |
          flake8 . --ignore=E302,E305

      - name: Dependency Scan
        run: |
          pip-audit

      - name: Bandit Scan
        run: |
          bandit -r . -s B104