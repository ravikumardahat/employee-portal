name: Build and Push Docker Image

on:
  workflow_call: 
  workflow_dispatch:
permissions:
  contents: write

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
         docker build \
          -t ravikumardahat/employee-connect:${{ github.run_number }} \
          -t ravikumardahat/employee-connect:latest .

    - name: Push Docker Image
      run: |
        docker push ravikumardahat/employee-connect:${{ github.run_number }}
        docker push ravikumardahat/employee-connect:latest
    - name: Configure Git
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "github-actions"
    - name: Update Deployment Image Tag
      run: |
        sed -i "s|image: ravikumardahat/employee-connect:.*|image: ravikumardahat/employee-connect:${{ github.run_number }}|g" k8s/emp-deployment.yaml

    - name: Commit and Push Changes
      run: |
        git add k8s/emp-deployment.yaml
    
        git diff --staged --quiet || \
        git commit -m "Update image tag to ${{ github.run_number }}"
    
        git push
