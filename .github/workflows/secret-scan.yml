name: Secret Scan
on:
  workflow_call:
  workflow_dispatch:
jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleak
        uses: gitleaks/gitleaks-action@v2
      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: gitleaks.sarif
     