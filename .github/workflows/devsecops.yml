name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  code-scan:
    uses: ./.github/workflows/code-scan.yaml

  docker-build:
    needs: code-scan
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit

  secret-scan:
    needs: secret-scan
    uses: ./.github/workflows/dockerfile-scan.yml
    

  image-scan:
    needs: docker-build
    uses: ./.github/workflows/image-scan.yml
    secrets: inherit