apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: emp-info-hpa
spec:
   scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: emp-info
   minReplicas: 2
   maxReplicas: 5
   
   behavior:
      scaleUp:
          stabilizationWindowSeconds: 0
      scaleDown:
         stabilizationWindowSeconds: 60  
   metrics:
     - type: Resource
       resource:
          name: cpu
          target:
             type: Utilization
             averageUtilization: 50

